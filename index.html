<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <!-- Responsividade para celular -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raspadinha do Amor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Título principal -->
  <h1>Raspadinha da Sorte 💖</h1>

  <!-- Aqui será criada a grade 3x3 via JavaScript -->
  <div class="grid" id="grid"></div>

  <!-- Tela escura que aparece ao mostrar mensagem -->
  <div id="overlay">
    <div id="messageBox"></div>
  </div>

  <!-- Botão para próxima tentativa -->
  <button id="nextBtn" style="display:none;">Tentar novamente</button>

  <!-- Som de raspagem -->
  <audio id="scratchSound" src="https://www.soundjay.com/misc/sounds/scratch-1.mp3"></audio>

  <script src="script.js"></script>
</body>
</html>
